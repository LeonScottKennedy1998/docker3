stages:
  - validate

variables:
  GIT_STRATEGY: clone

before_script:
  - node -v
  - npm -v

# Проверка сборки фронта
build-check-frontend:
  stage: validate
  script:
    - echo "=== Проверка сборки frontend ==="
    - cd frontend
    - npm install
    - npm run build

# Проверка бэка (просто установка зависимостей)
build-check-backend:
  stage: validate
  script:
    - echo "=== Проверка backend ==="
    - cd backend
    - npm install

# Линтер бэка
lint-check-backend:
  stage: validate
  script:
    - echo "=== Проверка линтером backend ==="
    - cd backend
    - npm install
    - npx eslint .